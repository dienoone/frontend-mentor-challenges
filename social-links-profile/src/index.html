<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<!-- displays site properly based on user's device -->

		<link
			rel="icon"
			type="image/png"
			sizes="32x32"
			href="./assets/images/favicon-32x32.png"
		/>
		<link rel="stylesheet" href="./css/output.css" />

		<title>Frontend Mentor | Social links profile</title>

		<!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
		<style>
			.attribution {
				font-size: 0.6875rem;
				text-align: center;
				color: hsl(0, 0%, 100%);
			}
			.attribution a {
				color: hsl(228, 45%, 44%);
			}
		</style>
	</head>
	<body class="space-y-2">
		<main
			class="w-75 px-4 py-8 rounded-xl shadow text-center bg-grey-800 space-y-4"
		>
			<img
				src="./assets/images/avatar-jessica.jpeg"
				alt=""
				class="rounded-full w-20 mx-auto"
			/>
			<div class="space-y-1.5">
				<h1 class="text-xl text-white font-semibold">Jessica Randall</h1>
				<p class="text-xs text-green font-semibold">London, United Kingdom</p>
			</div>

			<p class="text-white text-xs font-medium">
				"Front-end developer and avid reader."
			</p>

			<div class="space-y-3">
				<div class="social-button">GitHub</div>
				<div class="social-button">Frontend Mentor</div>
				<div class="social-button">LinkedIn</div>
				<div class="social-button">Twitter</div>
				<div class="social-button">Instagram</div>
			</div>
		</main>

		<footer class="attribution">
			Challenge by
			<a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>.
			Coded by <a href="#">Dikoy</a>.
		</footer>
	</body>
</html>
