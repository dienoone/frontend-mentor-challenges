<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />

		<link
			rel="icon"
			type="image/png"
			sizes="32x32"
			href="./assets/images/favicon-32x32.png"
		/>
		<link rel="stylesheet" href="./css/output.css" />

		<title>Frontend Mentor | Blog preview card</title>

		<style>
			.attribution {
				font-size: 0.6875rem;
				text-align: center;
			}
			.attribution a {
				color: hsl(228, 45%, 44%);
			}
		</style>
	</head>
	<body>
		<main
			class="bg-white p-8 rounded-xl border-3 border-black space-y-4 shadow-hard max-w-sm"
		>
			<div>
				<img
					src="./assets/images/illustration-article.svg"
					alt=""
					class="rounded-xl w-full"
				/>
			</div>
			<div class="bg-yellow py-1 px-4 w-fit rounded font-bold text-gray-950">
				Learning
			</div>
			<p>Published 21 Dec 2023</p>
			<h3
				class="text-xl font-extrabold text-gray-950 hover:cursor-pointer hover:text-yellow transition duration-150"
			>
				HTML & CSS foundations
			</h3>
			<p class="text-gray-500">
				These languages are the backbone of every website, defining structure,
				content, and presentation.
			</p>

			<div class="flex items-center space-x-4">
				<img src="./assets/images/image-avatar.webp" alt="Avatar" />
				<p class="font-extrabold text-gray-950">Greg Hooper</p>
			</div>
		</main>

		<footer class="attribution">
			Challenge by
			<a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>.
			Coded by <a href="#">Dikoy</a>.
		</footer>
	</body>
</html>
